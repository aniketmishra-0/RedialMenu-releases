<svg width="1024" height="880" viewBox="0 0 1024 880" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="-apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, Helvetica, Arial, sans-serif">
  <defs>
    <!-- Background gradient -->
    <radialGradient id="bg" cx="50%" cy="42%" r="75%">
      <stop offset="0%" stop-color="#1b2330"/>
      <stop offset="55%" stop-color="#10151e"/>
      <stop offset="100%" stop-color="#080b11"/>
    </radialGradient>

    <!-- Outer glass ring fill -->
    <radialGradient id="ringFill" cx="50%" cy="38%" r="70%">
      <stop offset="0%" stop-color="#3a4456" stop-opacity="0.55"/>
      <stop offset="70%" stop-color="#222b3a" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#161d28" stop-opacity="0.65"/>
    </radialGradient>

    <!-- Ring stroke gradient -->
    <linearGradient id="ringStroke" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.35"/>
      <stop offset="50%" stop-color="#ffffff" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.02"/>
    </linearGradient>

    <!-- Center hub gradient -->
    <radialGradient id="hub" cx="50%" cy="35%" r="75%">
      <stop offset="0%" stop-color="#1a1f29"/>
      <stop offset="100%" stop-color="#0a0d13"/>
    </radialGradient>

    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5b8cff"/>
      <stop offset="100%" stop-color="#7a5cff"/>
    </linearGradient>

    <!-- Soft drop shadow for tiles -->
    <filter id="tileShadow" x="-60%" y="-60%" width="220%" height="220%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.45"/>
    </filter>

    <!-- Outer glow for the whole wheel -->
    <filter id="wheelGlow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="22" result="b"/>
      <feColorMatrix in="b" type="matrix" values="0 0 0 0 0.36  0 0 0 0 0.55  0 0 0 0 1  0 0 0 0.5 0"/>
    </filter>

    <!-- Running dot glow -->
    <filter id="dotGlow" x="-150%" y="-150%" width="400%" height="400%">
      <feDropShadow dx="0" dy="0" stdDeviation="3" flood-color="#34d058" flood-opacity="0.9"/>
    </filter>

    <radialGradient id="dot" cx="35%" cy="30%" r="80%">
      <stop offset="0%" stop-color="#7bf59b"/>
      <stop offset="60%" stop-color="#34c759"/>
      <stop offset="100%" stop-color="#1f9e44"/>
    </radialGradient>

    <!-- App tile gradients -->
    <linearGradient id="gWhatsApp" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#5bf07a"/><stop offset="100%" stop-color="#16c44b"/></linearGradient>
    <linearGradient id="gFinder" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#3ec6ff"/><stop offset="100%" stop-color="#1d7ff0"/></linearGradient>
    <linearGradient id="gGhost" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#9a6bff"/><stop offset="100%" stop-color="#6a35e0"/></linearGradient>
    <linearGradient id="gMaccy" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#ff8a4c"/><stop offset="55%" stop-color="#ff5fa2"/><stop offset="100%" stop-color="#c44bff"/></linearGradient>
    <linearGradient id="gPritunl" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#28466b"/><stop offset="100%" stop-color="#16263d"/></linearGradient>
    <linearGradient id="gSafari" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#f4f7fb"/><stop offset="100%" stop-color="#d7dde6"/></linearGradient>
    <linearGradient id="gChrome" x1="0" y1="0" x2="0" y2="1"><stop offset="0%" stop-color="#fbfbfb"/><stop offset="100%" stop-color="#e9edf2"/></linearGradient>
    <linearGradient id="gRedial" x1="0" y1="0" x2="1" y2="1"><stop offset="0%" stop-color="#cfe0ff"/><stop offset="100%" stop-color="#9bb8f0"/></linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="880" fill="url(#bg)"/>

  <!-- Wheel outer glow -->
  <circle cx="512" cy="440" r="330" fill="url(#accent)" opacity="0.18" filter="url(#wheelGlow)"/>

  <!-- Outer glass ring -->
  <circle cx="512" cy="440" r="338" fill="url(#ringFill)" stroke="url(#ringStroke)" stroke-width="1.5"/>
  <circle cx="512" cy="440" r="337" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>

  <!-- ===== App tiles (8 around the ring) ===== -->

  <!-- TOP: Finder (512,170) -->
  <g filter="url(#tileShadow)">
    <rect x="462" y="120" width="100" height="100" rx="26" fill="url(#gFinder)"/>
    <path d="M512 145 q22 0 22 25 v10 q0 25 -22 25 q-22 0 -22 -25 v-10 q0 -25 22 -25Z" fill="#ffffff" opacity="0.92"/>
    <circle cx="503" cy="168" r="4" fill="#1d7ff0"/><circle cx="521" cy="168" r="4" fill="#1d7ff0"/>
    <path d="M502 186 q10 7 20 0" stroke="#1d7ff0" stroke-width="3.5" fill="none" stroke-linecap="round"/>
  </g>
  <circle cx="552" cy="130" r="9" fill="url(#dot)" filter="url(#dotGlow)"/>

  <!-- TOP-RIGHT: Chrome (703,249) -->
  <g filter="url(#tileShadow)">
    <rect x="653" y="199" width="100" height="100" rx="26" fill="url(#gChrome)"/>
    <circle cx="703" cy="249" r="34" fill="#4285f4"/>
    <path d="M703 215 A34 34 0 0 1 733 233 L703 233Z" fill="#ea4335"/>
    <path d="M733 233 A34 34 0 0 1 703 283 L688 257Z" fill="#fbbc05"/>
    <path d="M703 283 A34 34 0 0 1 673 233 L703 233Z" fill="#34a853"/>
    <circle cx="703" cy="249" r="15" fill="#ffffff"/><circle cx="703" cy="249" r="11" fill="#4285f4"/>
  </g>
  <circle cx="743" cy="209" r="9" fill="url(#dot)" filter="url(#dotGlow)"/>

  <!-- RIGHT: Ghost (782,440) -->
  <g filter="url(#tileShadow)">
    <rect x="732" y="390" width="100" height="100" rx="26" fill="url(#gGhost)"/>
    <path d="M782 412 q24 0 24 26 v26 l-9 -8 -8 8 -7 -8 -7 8 -9 -8 v-18 q0 -26 16 -26Z" fill="#ffffff"/>
    <circle cx="776" cy="438" r="4" fill="#6a35e0"/><circle cx="790" cy="438" r="4" fill="#6a35e0"/>
  </g>
  <circle cx="822" cy="400" r="9" fill="url(#dot)" filter="url(#dotGlow)"/>

  <!-- BOTTOM-RIGHT: Maccy (703,631) -->
  <g filter="url(#tileShadow)">
    <rect x="653" y="581" width="100" height="100" rx="26" fill="url(#gMaccy)"/>
    <path d="M703 605 q18 10 18 30 q0 22 -18 30 q-18 -8 -18 -30 q0 -20 18 -30Z" fill="#ffffff" opacity="0.92"/>
    <line x1="703" y1="612" x2="703" y2="660" stroke="#ff5fa2" stroke-width="2.5"/>
  </g>
  <circle cx="743" cy="591" r="9" fill="url(#dot)" filter="url(#dotGlow)"/>

  <!-- BOTTOM: Pritunl (512,710) -->
  <g filter="url(#tileShadow)">
    <rect x="462" y="660" width="100" height="100" rx="26" fill="url(#gPritunl)"/>
    <text x="512" y="730" text-anchor="middle" font-size="56" font-weight="800" fill="#ffffff">p</text>
  </g>
  <circle cx="552" cy="670" r="9" fill="url(#dot)" filter="url(#dotGlow)"/>

  <!-- BOTTOM-LEFT: RedialMenu (321,631) -->
  <g filter="url(#tileShadow)">
    <rect x="271" y="581" width="100" height="100" rx="26" fill="url(#gRedial)"/>
    <circle cx="321" cy="631" r="26" fill="none" stroke="#3a5cff" stroke-width="6"/>
    <path d="M314 619 l18 12 l-18 12Z" fill="#3a5cff"/>
  </g>
  <circle cx="361" cy="591" r="9" fill="url(#dot)" filter="url(#dotGlow)"/>

  <!-- LEFT: Safari (242,440) -->
  <g filter="url(#tileShadow)">
    <rect x="192" y="390" width="100" height="100" rx="26" fill="url(#gSafari)"/>
    <circle cx="242" cy="440" r="36" fill="#1da1f2"/>
    <circle cx="242" cy="440" r="36" fill="none" stroke="#ffffff" stroke-width="3"/>
    <path d="M242 440 l26 -26 l-16 36 l-36 16Z" fill="#ff3b30"/>
    <path d="M242 440 l26 -26 l-26 26 l-36 16Z" fill="#ffffff"/>
  </g>
  <circle cx="282" cy="400" r="9" fill="url(#dot)" filter="url(#dotGlow)"/>

  <!-- TOP-LEFT: WhatsApp (321,249) -->
  <g filter="url(#tileShadow)">
    <rect x="271" y="199" width="100" height="100" rx="26" fill="url(#gWhatsApp)"/>
    <path d="M321 218 a31 31 0 1 0 16 58 l16 5 -5 -16 a31 31 0 0 0 -27 -47Z" fill="#ffffff"/>
    <path d="M309 232 q-4 2 -3 9 q2 14 16 22 q8 4 12 1 q3 -2 3 -6 l-7 -5 q-2 2 -4 1 q-7 -4 -10 -12 q-1 -2 1 -4 l-3 -7 q-3 -1 -5 1Z" fill="#16c44b"/>
  </g>
  <circle cx="361" cy="209" r="9" fill="url(#dot)" filter="url(#dotGlow)"/>

  <!-- ===== Center hub ===== -->
  <circle cx="512" cy="440" r="150" fill="url(#hub)" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1.5"/>
  <circle cx="512" cy="440" r="150" fill="none" stroke="#000000" stroke-opacity="0.4" stroke-width="2" transform="translate(0,2)"/>

  <!-- Center app glyph -->
  <g filter="url(#tileShadow)">
    <rect x="482" y="368" width="60" height="60" rx="16" fill="url(#gRedial)"/>
    <circle cx="512" cy="398" r="15" fill="none" stroke="#3a5cff" stroke-width="4"/>
    <path d="M508 391 l10 7 l-10 7Z" fill="#3a5cff"/>
  </g>

  <text x="512" y="460" text-anchor="middle" font-size="34" font-weight="800" fill="#ffffff" letter-spacing="0.5">RedialMenu</text>
  <text x="512" y="490" text-anchor="middle" font-size="18" font-weight="600" fill="#8a93a3" letter-spacing="2">RUNNING APPS</text>
</svg>
